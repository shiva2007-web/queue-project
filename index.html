<!DOCTYPE html>
<html>
<head>
    <title>Invisible Queue</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            margin: 0;
        }

        .container {
            padding: 20px;
        }

        h1 {
            margin-top: 10px;
        }

        input {
            padding: 12px;
            width: 80%;
            border-radius: 8px;
            border: none;
            margin: 10px 0;
        }

        button {
            padding: 12px;
            width: 85%;
            margin: 5px;
            border-radius: 8px;
            border: none;
            background: #22c55e;
            color: white;
            font-size: 16px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #1e293b;
            margin: 10px auto;
            padding: 12px;
            width: 85%;
            border-radius: 10px;
        }
    </style>
</head>

<body>
<div class="container">

<h1>🚀 Smart Queue</h1>

<input id="name" placeholder="Enter your name">
<button onclick="join()">Join Queue</button>

<h2>Live Queue</h2>
<ul id="list"></ul>

<button onclick="next()">Next Person</button>

</div>

<script>
const API = "http://localhost:3000";
let userId = null;

// JOIN
function join() {
    let name = document.getElementById("name").value;

    navigator.geolocation.getCurrentPosition((pos) => {
        fetch(API + "/join", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                name,
                lat: pos.coords.latitude,
                lon: pos.coords.longitude
            })
        })
        .then(res => res.json())
        .then(data => {
            userId = data.id;
            alert("Joined! Position: " + data.position);
        });
    });
}

// LOAD QUEUE
function load() {
    fetch(API + "/queue")
    .then(res => res.json())
    .then(data => {
        let list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach((u, i) => {
            list.innerHTML += `<li>👤 ${u.name} — #${i+1}</li>`;

            // Notification
            if (u.id === userId && i === 0) {
                alert("🎉 It's your turn!");
            }
        });
    });
}

// NEXT
function next() {
    fetch(API + "/next", { method: "POST" });
}

// AUTO REFRESH
setInterval(load, 2000);

// ACTIVE SIGNAL
setInterval(() => {
    if (userId) {
        fetch(API + "/active", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ id: userId })
        });
    }
}, 3000);

</script>

</body>
</html>
