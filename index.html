<!DOCTYPE html>
<html>
<head>
    <title>Invisible Queue</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        input {
            padding: 10px;
            width: 200px;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background: white;
            margin: 5px auto;
            width: 250px;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>🚀 Invisible Queue System</h1>

<input id="name" placeholder="Enter name">
<button onclick="join()">Join Queue</button>

<h2>Queue List</h2>
<ul id="list"></ul>

<button onclick="next()">Next Person</button>

<script>
const API = "http://localhost:3000";

function join() {
    let name = document.getElementById("name").value;

    fetch(API + "/join", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ name })
    })
    .then(res => res.json())
    .then(data => alert("Your Position: " + data.position));
}

function load() {
    fetch(API + "/queue")
    .then(res => res.json())
    .then(data => {
        let list = document.getElementById("list");
        list.innerHTML = "";

        let avgTime = 2; // minutes per person

data.forEach((u, i) => {
    let wait = i * avgTime;
    list.innerHTML += `<li>👤 ${u.name} — Position ${i+1} — ⏳ ${wait} min</li>`;
});

function next() {
    fetch(API + "/next", { method: "POST" });
}

setInterval(load, 2000);
</script>

</body>
</html>
