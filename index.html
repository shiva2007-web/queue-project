<!DOCTYPE html>
<html>
<head>
    <title>Virtual Queue</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial;
            background: linear-gradient(to right, #eef2ff, #f8fafc);
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .nav-left {
            width: 83%;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu {
            font-size: 22px;
        }

        .title {
            font-size: 20px;
            font-weight: 600;
        }

        .admin-btn {
            width: 17%;
            background: #4f46e5;
            color: white;
            padding: 8px;
            border-radius: 6px;
            border: none;
            font-size: 12px;
        }

        /* HERO */
        .hero {
            height: 180px;
            background: url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        /* CARD */
        .card {
            max-width: 420px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
        }

        .join-btn {
            background: #22c55e;
            color: white;
        }

        .next-btn {
            background: #ef4444;
            color: white;
        }

        /* QUEUE */
        ul {
            padding: 0;
        }

        li {
            list-style: none;
            padding: 12px;
            margin: 8px 0;
            background: #f1f5f9;
            border-radius: 8px;
            transition: 0.3s;
        }

        li:hover {
            transform: scale(1.02);
        }

        .me {
            background: #22c55e !important;
            color: white;
            font-weight: bold;
        }

        /* FOOTER */
        .footer {
            margin-top: 40px;
            padding: 25px;
            background: #0f172a;
            color: white;
            text-align: center;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="nav-left">
        <div class="menu">☰</div>
        <div class="title">Virtual Queue</div>
    </div>

    <button class="admin-btn" onclick="showAdminLogin()">ADMIN</button>
</div>

<!-- HERO -->
<div class="hero">
    Skip the Queue. Save Time ⏳
</div>

<!-- MAIN -->
<div class="card">

    <h2>🧾 Join Queue</h2>

    <input id="name" placeholder="Enter your name">
    <button class="join-btn" onclick="join()">Join Queue</button>

    <h3>📊 Live Queue</h3>
    <ul id="list"></ul>

    <button class="next-btn" onclick="next()">Next Person</button>

</div>

<!-- FOOTER -->
<div class="footer">
    <h3>About</h3>
    <p>
        Virtual Queue eliminates physical waiting using real-time updates,
        location validation, and smart tracking.
    </p>
    <p style="margin-top:10px; font-size:12px;">
        © 2026 Virtual Queue | Developed by <b>Gnanashiva K P</b>
    </p>
</div>

<script>
const API = "http://localhost:3000";

let userId = null;
let isAdmin = false;

// DEVICE ID
let deviceId = localStorage.getItem("deviceId");
if (!deviceId) {
    deviceId = Date.now().toString();
    localStorage.setItem("deviceId", deviceId);
}

// ADMIN LOGIN
function showAdminLogin() {
    let pass = prompt("Enter Admin Password");
    if (pass === "admin123") {
        isAdmin = true;
        alert("Admin Logged In");
    } else {
        alert("Wrong password");
    }
}

// JOIN
function join() {
    let name = document.getElementById("name").value;

    if (!name) {
        alert("Enter name");
        return;
    }

    navigator.geolocation.getCurrentPosition((pos) => {
        fetch(API + "/join", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                name,
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                deviceId
            })
        })
        .then(res => res.json())
        .then(data => {

            if (data.message) {
                alert(data.message);
                return;
            }

            userId = data.id;
            alert("Joined! Position: " + data.position);

            document.getElementById("name").value = "";
        });
    });
}

// LOAD
function load() {
    fetch(API + "/queue")
    .then(res => res.json())
    .then(data => {
        let list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach((u, i) => {
            list.innerHTML += `<li class="${u.id === userId ? 'me' : ''}">
            👤 ${u.name} — Position ${i+1}</li>`;

            if (u.id === userId && i === 0) {
                alert("🎉 It's your turn!");
            }
        });
    });
}

// NEXT
function next() {
    if (!isAdmin) {
        alert("Admin only");
        return;
    }

    fetch(API + "/next", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ password: "admin123" })
    });
}

// AUTO
setInterval(load, 2000);

//ACTIVE
setInterval(() => {
    if (userId) {
        fetch(API + "/active", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ id: userId })
        });
    }
}, 3000);
</script>

</body>
</html>
