<!DOCTYPE html>
<html>
<head>
    <title>Smart Queue</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #0f172a;
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            background: #1e293b;
        }

        .app-name {
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        input {
            padding: 12px;
            width: 80%;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 12px;
            width: 85%;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            background: #22c55e;
            color: white;
        }

        .admin-btn {
            background: #3b82f6;
            padding: 6px 12px;
            font-size: 12px;
        }

        li {
            background: #1e293b;
            margin: 10px auto;
            padding: 10px;
            width: 85%;
            border-radius: 10px;
            list-style: none;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="app-name">SmartQueue</div>
    <button class="admin-btn" onclick="showAdminLogin()">ADMIN</button>
</div>

<div class="container">

<input id="name" placeholder="Enter your name">
<button onclick="join()">Join Queue</button>

<h2>Live Queue</h2>
<ul id="list"></ul>

<button onclick="next()">Next Person</button>

</div>

<script>
const API = "http://localhost:3000";

let userId = null;
let isAdmin = false;

// device id
let deviceId = localStorage.getItem("deviceId");
if (!deviceId) {
    deviceId = Date.now().toString();
    localStorage.setItem("deviceId", deviceId);
}

// ADMIN LOGIN
function showAdminLogin() {
    let pass = prompt("Enter Admin Password");

    if (pass === "admin123") {
        isAdmin = true;
        alert("Admin logged in");
    } else {
        alert("Wrong password");
    }
}

// JOIN
function join() {
    let name = document.getElementById("name").value;

    navigator.geolocation.getCurrentPosition((pos) => {
        fetch(API + "/join", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                name,
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                deviceId: deviceId
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.message) {
                alert(data.message);
                return;
            }

            userId = data.id;
            alert("Joined! Position: " + data.position);

            // clear input
            document.getElementById("name").value = "";
        });
    });
}

// LOAD QUEUE
function load() {
    fetch(API + "/queue")
    .then(res => res.json())
    .then(data => {
        let list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach((u, i) => {
            list.innerHTML += `<li>👤 ${u.name} — #${i+1}</li>`;

            if (u.id === userId && i === 0) {
                alert("🎉 It's your turn!");
            }
        });
    });
}

// NEXT
function next() {
    if (!isAdmin) {
        alert("Only admin can do this");
        return;
    }

    fetch(API + "/next", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ password: "admin123" })
    });
}

// AUTO REFRESH
setInterval(load, 2000);

// ACTIVE SIGNAL
setInterval(() => {
    if (userId) {
        fetch(API + "/active", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ id: userId })
        });
    }
}, 3000);

</script>

</body>
</html>
